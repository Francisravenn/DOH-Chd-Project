{% extends "super_admin_base.html" %}

{% block title %}Add New Admin User{% endblock %}

{% block content %}
<div class="main-content">
    <div class="container-fluid py-4">
        <h2>Add New Admin User</h2>

        <div class="card shadow-sm">
            <div class="card-body">
                <form method="post">
                    {% csrf_token %}
                    {{ form.as_p }}
                    <div class="mt-4">
                        <button type="submit" class="btn btn-primary">Create Admin</button>
                        <a href="{% url 'superadmin_dashboard' %}" class="btn btn-secondary">Cancel</a>
                    </div>
                </form>

                {% if messages %}
                    {% for message in messages %}
                        <div class="alert alert-{{ message.tags }} mt-4">{{ message }}</div>
                    {% endfor %}
                {% endif %}
            </div>
        </div>
    </div>
</div>
{% endblock %}
