{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="refresh" content="30">
    <title>DOH IT Helpdesk - Live Queue Monitor</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f5f5f5;
            color: #212529;
            font-family: 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
            margin: 0;
            padding: 0;
        }
        .official-header {
            background-color: #003366;
            color: white;
            padding: 1.25rem 2rem;
        }
        .header-inner {
            max-width: 1600px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 1rem;
        }
        .header-title-group {
            flex: 1;
        }
        .header-title {
            font-size: 1.95rem;
            font-weight: 700;
            letter-spacing: 0.8px;
            margin: 0 0 0.35rem 0;
            text-transform: uppercase;
        }
        .header-gold-bar {
            height: 8px;
            background-color: #c9a227;
            width: 100%;
        }
        .logo-wrapper {
            width: 130px;
            height: 130px;
            flex-shrink: 0;
            margin-left: 1.5rem;
        }
        .logo-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
        .current-datetime {
            font-size: 1.15rem;
            font-weight: 500;
            color: #e8ecef;
            white-space: nowrap;
            min-width: 260px;
            text-align: right;
        }
        .container-fluid { padding: 1.5rem 2rem; }
        .kpi-card {
            background-color: white;
            border: 1px solid #dee2e6;
            border-left: 5px solid;
            border-radius: 0.375rem;
            padding: 1rem;
            text-align: center;
            box-shadow: 0 1px 4px rgba(0,0,0,0.08);
        }
        .kpi-new { border-left-color: #0d6efd; }
        .kpi-queue { border-left-color: #ffc107; }
        .kpi-assist { border-left-color: #198754; }
        .kpi-done { border-left-color: #6c757d; }
        .kpi-value { font-size: 2.8rem; font-weight: 700; margin: 0.25rem 0; }
        .kpi-label { font-size: 1.1rem; font-weight: 500; color: #495057; }
        .column {
            background-color: white;
            border: 1px solid #dee2e6;
            border-radius: 0.375rem;
            padding: 1.25rem;
            box-shadow: 0 1px 5px rgba(0,0,0,0.08);
            min-height: 60vh;
        }
        .column-header {
            font-size: 1.4rem;
            font-weight: 700;
            padding-bottom: 0.75rem;
            margin-bottom: 1rem;
            border-bottom: 2px solid;
            text-align: center;
        }
        .new-header { border-bottom-color: #0d6efd; color: #0d6efd; }
        .queue-header { border-bottom-color: #ffc107; color: #664d03; }
        .assist-header { border-bottom-color: #198754; color: #0f5132; }
        .done-header { border-bottom-color: #6c757d; color: #495057; }
        .ticket {
            border: 1px solid #dee2e6;
            border-left: 5px solid #6c757d;
            border-radius: 0.375rem;
            padding: 1rem;
            margin-bottom: 1rem;
            background-color: #fff;
        }
        .ticket.urgent { border-left-color: #dc3545; background-color: #fff5f5; }
        .ticket.medium-wait { border-left-color: #fd7e14; }
        .ticket.long-wait { border-left-color: #dc3545; background-color: #fff5f5; }
        .ticket-title { font-size: 1.25rem; font-weight: 700; margin-bottom: 0.5rem; }
        .ticket-info { font-size: 1rem; color: #495057; }
        .time-ago { font-size: 0.95rem; color: #6c757d; margin-top: 0.6rem; }
        .no-tickets {
            text-align: center;
            color: #6c757d;
            padding: 2.5rem 1rem;
            font-style: italic;
        }
        footer {
            margin-top: 3rem;
            text-align: center;
            color: #6c757d;
            font-size: 0.9rem;
            padding-bottom: 1.5rem;
        }
    </style>
</head>
<body>

    <header class="official-header">
        <div class="header-inner">
            <div class="header-title-group">
                <h1 class="header-title">DOH IT HELPDESK</h1>
                <div class="header-gold-bar"></div>
            </div>
            <div class="logo-wrapper">
                <img src="{% static 'images/CHD4A.png' %}" alt="DOH Logo">
            </div>
            <div class="current-datetime" id="datetime-display">
                Loading date & time...
            </div>
        </div>
    </header>

    <div class="container-fluid mt-4">
        <div class="row g-3 mb-4 text-center">
            <div class="col-6 col-md-3">
                <div class="kpi-card kpi-new">
                    <div class="kpi-label">New Requests</div>
                    <div class="kpi-value" id="kpi-new">0</div>
                </div>
            </div>
            <div class="col-6 col-md-3">
                <div class="kpi-card kpi-queue">
                    <div class="kpi-label">In Queue</div>
                    <div class="kpi-value" id="kpi-queue">0</div>
                </div>
            </div>
            <div class="col-6 col-md-3">
                <div class="kpi-card kpi-assist">
                    <div class="kpi-label">Currently Assisting</div>
                    <div class="kpi-value" id="kpi-assisting">0</div>
                </div>
            </div>
            <div class="col-6 col-md-3">
                <div class="kpi-card kpi-done">
                    <div class="kpi-label">Completed Today</div>
                    <div class="kpi-value" id="kpi-completed">0</div>
                </div>
            </div>
        </div>

        <div class="row g-4">
            <div class="col-12 col-lg-4 col-md-6">
                <div class="column">
                    <h2 class="column-header new-header">NEW REQUESTS</h2>
                    <div id="new-requests"></div>
                </div>
            </div>
            <div class="col-12 col-lg-4 col-md-6">
                <div class="column">
                    <h2 class="column-header queue-header">IN QUEUE</h2>
                    <div id="accepted"></div>
                </div>
            </div>
            <div class="col-12 col-lg-4 col-md-6">
                <div class="column">
                    <h2 class="column-header assist-header">CURRENTLY ASSISTING</h2>
                    <div id="assisting"></div>
                </div>
            </div>
            <div class="col-12">
                <div class="column">
                    <h2 class="column-header done-header">RECENTLY COMPLETED</h2>
                    <div id="completed"></div>
                </div>
            </div>
        </div>
    </div>

    <footer>
        Auto-updates every 8 seconds • DOH IT Helpdesk Live Queue Monitor
    </footer>

    <script>
        function updateDateTime() {
            const options = {
                timeZone: 'Asia/Manila',
                year: 'numeric',
                month: 'long',
                day: 'numeric',
                hour: 'numeric',
                minute: '2-digit',
                second: '2-digit',
                hour12: true
            };
            const now = new Date().toLocaleString('en-PH', options);
            document.getElementById('datetime-display').textContent = now;
        }
        setInterval(updateDateTime, 1000);
        updateDateTime();

        function renderTicket(ticket, columnType) {
            let bgClass = ticket.is_urgent ? 'urgent' : '';
            let html = `
                <div class="ticket ${bgClass}">
                    <div class="ticket-title">${ticket.control_no}</div>
                    <div class="ticket-info">
                        <strong>Division:</strong> ${ticket.division_section || 'N/A'}<br>
                        <strong>Requested by:</strong> ${ticket.requested_by || 'N/A'}
                    </div>
            `;

            if (columnType === 'new' || columnType === 'accepted') {
                html += `<div class="time-ago">Waiting ${ticket.elapsed || 'N/A'}</div>`;
            } else if (columnType === 'assisting') {
                html += `
                    <div><strong>Assisted by:</strong> ${ticket.assisted_by || 'Unknown'}</div>
                    <div class="time-ago">Since ${ticket.assisted_at || 'N/A'}</div>
                `;
            } else if (columnType === 'completed') {
                html += `<div class="time-ago">Completed ${ticket.completed_at || 'N/A'}</div>`;
            }

            html += `</div>`;
            return html;
        }

        async function updateLiveQueue() {
            try {
                const response = await fetch("{% url 'live_queue' %}", {
                    headers: { 'X-Requested-With': 'XMLHttpRequest' }
                });
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                const data = await response.json();

                document.getElementById('kpi-new').textContent       = data.new_requests?.length || 0;
                document.getElementById('kpi-queue').textContent     = data.accepted?.length || 0;
                document.getElementById('kpi-assisting').textContent = data.assisting?.length || 0;
                document.getElementById('kpi-completed').textContent = data.completed?.length || 0;

                document.getElementById('new-requests').innerHTML =
                    data.new_requests?.length
                        ? data.new_requests.map(t => renderTicket(t, 'new')).join('')
                        : '<div class="no-tickets">No new requests pending.</div>';

                document.getElementById('accepted').innerHTML =
                    data.accepted?.length
                        ? data.accepted.map(t => renderTicket(t, 'accepted')).join('')
                        : '<div class="no-tickets">Queue is currently clear.</div>';

                document.getElementById('assisting').innerHTML =
                    data.assisting?.length
                        ? data.assisting.map(t => renderTicket(t, 'assisting')).join('')
                        : '<div class="no-tickets">No active assistance at this time.</div>';

                document.getElementById('completed').innerHTML =
                    data.completed?.length
                        ? data.completed.map(t => renderTicket(t, 'completed')).join('')
                        : '<div class="no-tickets">No recent completions recorded.</div>';
            } catch (err) {
                console.error(err);
            }
        }

        updateLiveQueue();
        setInterval(updateLiveQueue, 8000);
    </script>
</body>
</html>
